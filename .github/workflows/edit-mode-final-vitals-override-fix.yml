name: Edit-Mode final vitals override fix

on:
  push:
    branches: [Edit-Mode]

permissions:
  contents: write

concurrency:
  group: edit-mode-final-vitals-override-fix
  cancel-in-progress: true

jobs:
  repair:
    if: ${{ !contains(github.event.head_commit.message, '[skip final-vitals-override-fix]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Edit-Mode
      - name: Patch final HP MP override block
        shell: python
        run: |
          from pathlib import Path

          def replace_all(text, old, new, label):
              count = text.count(old)
              if count == 0:
                  print('missing', label)
                  return text
              print(label, count)
              return text.replace(old, new)

          def patch(path):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              original = text

              text = replace_all(text,
                ".vital-number-grid.ma-v8-mp-grid{ grid-template-columns:repeat(2,minmax(0,1fr)) !important; }",
                ".vital-number-grid.ma-v8-mp-grid{ grid-template-columns:repeat(3,minmax(0,1fr)) !important; }",
                f'{path} mp css desktop')
              text = replace_all(text,
                "  .vital-number-grid.ma-v8-mp-grid{ grid-template-columns:repeat(2,minmax(0,1fr)) !important; }",
                "  .vital-number-grid.ma-v8-mp-grid{ grid-template-columns:repeat(3,minmax(0,1fr)) !important; }",
                f'{path} mp css mobile')

              text = replace_all(text,
                "ensureHidden('hp_max','0'); ensureHidden('hp_max_temp','0'); ensureHidden('mp_max','0'); ensureHidden('mp_temp','0'); ensureHidden('mp_base','0'); ensureHidden('mp_bonus','0');",
                "ensureHidden('hp_max','0'); ensureHidden('hp_max_temp','0'); ensureHidden('mp_max','0'); ensureHidden('mp_max_temp','0'); ensureHidden('mp_base','0'); ensureHidden('mp_bonus','0');",
                f'{path} ensure max temp')

              old_mp_refresh = """    const mpGrid=document.getElementById('mp_curr')?.closest('.vital-number-grid');
    if(mpGrid){
      mpGrid.className='vital-number-grid ma-v8-mp-grid';
      labelFor('mp_curr','Current'); labelFor('mp_effective_max','Total MP');
      const mpCurr=document.getElementById('mp_curr'), mpTotal=document.getElementById('mp_effective_max');
      if(mpCurr){ mpCurr.readOnly=false; mpCurr.removeAttribute('aria-readonly'); mpCurr.classList.remove('readonly-yellow'); }
      if(mpTotal){ mpTotal.readOnly=true; mpTotal.setAttribute('aria-readonly','true'); mpTotal.value=String(Math.max(0, num('mp_max') + num('mp_temp'))); }
    }"""
              new_mp_refresh = """    const mpGrid=document.getElementById('mp_curr')?.closest('.vital-number-grid');
    if(mpGrid){
      mpGrid.className='vital-number-grid ma-v8-mp-grid';
      labelFor('mp_curr','Current'); labelFor('mp_temp','Temp MP'); labelFor('mp_effective_max','Total Max');
      const mpCurr=document.getElementById('mp_curr'), mpTemp=document.getElementById('mp_temp'), mpTotal=document.getElementById('mp_effective_max');
      if(mpCurr){ mpCurr.readOnly=false; mpCurr.removeAttribute('aria-readonly'); mpCurr.classList.remove('readonly-yellow'); }
      if(mpTemp){ mpTemp.closest('label')?.classList.add('ma-v8-temp'); mpTemp.readOnly=false; mpTemp.removeAttribute('aria-readonly'); mpTemp.classList.remove('readonly-yellow'); }
      if(mpTotal){ mpTotal.readOnly=true; mpTotal.setAttribute('aria-readonly','true'); mpTotal.value=String(Math.max(0, num('mp_max') + num('mp_max_temp'))); }
    }"""
              text = replace_all(text, old_mp_refresh, new_mp_refresh, f'{path} final mp refresh')

              old_hp_edit = """      body.innerHTML='<div class="formula-line"><strong>HP Maximum</strong><div class="formula-parts">'+mini('Base','hp_max',true)+mini('Max Temp','hp_max_temp',false)+total('Total Max', num('hp_max')+num('hp_max_temp'))+'</div><div class="section-note">Current HP and Temp HP are edited on the HP card. Base is calculated from class HP. Max Temp modifies the total maximum.</div></div>';
      bindEdit(body,['hp_max_temp'],()=>num('hp_max')+num('hp_max_temp'));"""
              new_hp_edit = """      body.innerHTML='<div class="formula-line"><strong>HP</strong><div class="formula-parts">'+mini('Current','hp_curr',false)+mini('Temp HP','hp_temp',false)+mini('Base','hp_max',true)+mini('Max Temp','hp_max_temp',false)+total('Total Max', num('hp_max')+num('hp_max_temp'))+'</div><div class="section-note">Temp HP is separate from Max Temp. Base is calculated from class HP. Max Temp modifies the total maximum.</div></div>';
      bindEdit(body,['hp_curr','hp_temp','hp_max_temp'],()=>num('hp_max')+num('hp_max_temp'));"""
              text = replace_all(text, old_hp_edit, new_hp_edit, f'{path} final hp edit')

              old_mp_edit = """      ensureHidden('mp_max','0'); ensureHidden('mp_temp','0'); ensureHidden('mp_base','0'); ensureHidden('mp_bonus','0');
      if(title) title.textContent='Edit MP';
      body.innerHTML='<div class="formula-line"><strong>MP Maximum</strong><div class="formula-parts">'+mini('Base','mp_base',true)+mini('Extra Conversion','mp_bonus',true)+mini('Max Temp','mp_temp',false)+total('Total MP', num('mp_max')+num('mp_temp'))+'</div><div class="section-note">Base and Extra Conversion come from class/spell data. Max Temp manually modifies Total MP.</div></div>';
      bindEdit(body,['mp_temp'],()=>num('mp_max')+num('mp_temp'));"""
              new_mp_edit = """      ensureHidden('mp_max','0'); ensureHidden('mp_max_temp','0'); ensureHidden('mp_base','0'); ensureHidden('mp_bonus','0');
      if(title) title.textContent='Edit MP';
      body.innerHTML='<div class="formula-line"><strong>MP</strong><div class="formula-parts">'+mini('Current','mp_curr',false)+mini('Temp MP','mp_temp',false)+mini('Base','mp_max',true)+mini('Max Temp','mp_max_temp',false)+total('Total Max', num('mp_max')+num('mp_max_temp'))+'</div><div class="section-note">Temp MP is separate from Max Temp. Base comes from class/spell data. Max Temp modifies Total Max.</div></div>';
      bindEdit(body,['mp_curr','mp_temp','mp_max_temp'],()=>num('mp_max')+num('mp_max_temp'));"""
              text = replace_all(text, old_mp_edit, new_mp_edit, f'{path} final mp edit')

              text = replace_all(text,
                "['hp_curr','hp_temp','hp_max','hp_max_temp','mp_curr','mp_max','mp_temp','mp_base','mp_bonus','str','dex','con','int','wis','cha']",
                "['hp_curr','hp_temp','hp_max','hp_max_temp','mp_curr','mp_temp','mp_max','mp_max_temp','mp_base','mp_bonus','str','dex','con','int','wis','cha']",
                f'{path} final listener ids')

              # Compatibility with older progression helpers: total max should use max-temp, not current temp.
              text = text.replace("const hpMaxEff = Math.max(0, totals.hp + hpTemp);", "const hpMaxEff = Math.max(0, totals.hp + maV4Num('hp_max_temp', 0));")
              text = text.replace("const mpEff = Math.max(0, mpBase + mpTemp);", "const mpEff = Math.max(0, mpBase + maV4Num('mp_max_temp', 0));")
              text = text.replace("const mpMaxTemp = Number(d.mp_temp || document.getElementById('mp_temp')?.value || 0) || 0;", "const mpMaxTemp = Number(d.mp_max_temp || document.getElementById('mp_max_temp')?.value || 0) || 0;")
              text = text.replace("const mpMaxTemp = Number(document.getElementById('mp_temp')?.value || d.mp_temp || 0) || 0;", "const mpMaxTemp = Number(document.getElementById('mp_max_temp')?.value || d.mp_max_temp || 0) || 0;")

              if text != original:
                  p.write_text(text, encoding='utf-8')
                  print(path, 'patched')
              else:
                  print(path, 'no changes')

          for filename in ['characters.html', 'admin.html']:
              patch(filename)
      - name: Remove one-time workflow files
        shell: bash
        run: |
          rm -f .github/workflows/edit-mode-final-vitals-override-fix.yml .github/edit-mode-final-vitals-trigger.txt
      - name: Commit patched files
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add characters.html admin.html .github/workflows/edit-mode-final-vitals-override-fix.yml .github/edit-mode-final-vitals-trigger.txt
          git commit -m "Fix final HP MP override block [skip final-vitals-override-fix]"
          git push