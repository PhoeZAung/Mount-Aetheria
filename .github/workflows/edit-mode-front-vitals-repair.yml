name: Edit-Mode front vitals repair

on:
  push:
    branches: [Edit-Mode]

permissions:
  contents: write

concurrency:
  group: edit-mode-front-vitals-repair
  cancel-in-progress: true

jobs:
  repair:
    if: ${{ !contains(github.event.head_commit.message, '[skip front-vitals-repair]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Edit-Mode
      - name: Force visible front HP MP temp columns
        shell: python
        run: |
          from pathlib import Path

          CSS = '''
          <style>
          /* --- Edit-Mode front vitals: always show Current / Temp / Total Max --- */
          .vital-number-grid.ma-v8-hp-grid,
          .vital-number-grid.ma-v8-mp-grid {
            display:grid !important;
            grid-template-columns:minmax(64px,1fr) minmax(64px,1fr) minmax(82px,1.15fr) !important;
            gap:6px !important;
            width:100% !important;
          }
          .vital-number-grid.ma-v8-hp-grid > label,
          .vital-number-grid.ma-v8-mp-grid > label {
            display:flex !important;
            visibility:visible !important;
            opacity:1 !important;
            min-width:0 !important;
            flex-direction:column !important;
            align-items:center !important;
          }
          .vital-number-grid.ma-v8-hp-grid input,
          .vital-number-grid.ma-v8-mp-grid input {
            display:block !important;
            visibility:visible !important;
            opacity:1 !important;
            width:100% !important;
            min-width:0 !important;
          }
          .vital-number-grid.ma-v8-hp-grid .ma-v8-temp small,
          .vital-number-grid.ma-v8-mp-grid .ma-v8-temp small {
            color:#f0d18a !important;
          }
          @media(max-width:430px){
            .vital-number-grid.ma-v8-hp-grid,
            .vital-number-grid.ma-v8-mp-grid { grid-template-columns:repeat(3,minmax(0,1fr)) !important; }
            .vital-number-grid.ma-v8-hp-grid small,
            .vital-number-grid.ma-v8-mp-grid small { font-size:8px !important; letter-spacing:.03em !important; }
          }
          </style>
          '''

          def patch(path):
            p = Path(path)
            text = p.read_text(encoding='utf-8')
            original = text

            text = text.replace('<label><small>Temp</small><input id="hp_temp" type="number" class="live-field main-vital-input"></label>', '<label class="ma-v8-temp"><small>Temp HP</small><input id="hp_temp" type="number" class="live-field main-vital-input"></label>')
            text = text.replace('<label><small>Temp</small><input id="hp_temp" type="number" class="save-field main-vital-input"></label>', '<label class="ma-v8-temp"><small>Temp HP</small><input id="hp_temp" type="number" class="save-field main-vital-input"></label>')
            text = text.replace('<label><small>Temp</small><input id="mp_temp" type="number" class="live-field main-vital-input"></label>', '<label class="ma-v8-temp"><small>Temp MP</small><input id="mp_temp" type="number" class="live-field main-vital-input"></label>')
            text = text.replace('<label><small>Temp</small><input id="mp_temp" type="number" class="save-field main-vital-input"></label>', '<label class="ma-v8-temp"><small>Temp MP</small><input id="mp_temp" type="number" class="save-field main-vital-input"></label>')

            # Also handle previously patched indentation variants.
            text = text.replace('<label><small>Temp</small><input id="hp_temp" type="number" class="live-field main-vital-input"></label>', '<label class="ma-v8-temp"><small>Temp HP</small><input id="hp_temp" type="number" class="live-field main-vital-input"></label>')
            text = text.replace('<label><small>Temp</small><input id="mp_temp" type="number" class="live-field main-vital-input"></label>', '<label class="ma-v8-temp"><small>Temp MP</small><input id="mp_temp" type="number" class="live-field main-vital-input"></label>')

            if 'Edit-Mode front vitals: always show Current / Temp / Total Max' not in text:
              text = text.replace('</head>', CSS + '\n</head>', 1)

            if text != original:
              p.write_text(text, encoding='utf-8')
              print(path, 'patched')
            else:
              print(path, 'no changes')

          for f in ['characters.html', 'admin.html']:
            patch(f)
      - name: Remove one-time workflow files
        shell: bash
        run: |
          rm -f .github/workflows/edit-mode-front-vitals-repair.yml .github/edit-mode-front-vitals-trigger.txt
      - name: Commit patched files
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add characters.html admin.html .github/workflows/edit-mode-front-vitals-repair.yml .github/edit-mode-front-vitals-trigger.txt
          git commit -m "Show front HP MP temp columns [skip front-vitals-repair]"
          git push