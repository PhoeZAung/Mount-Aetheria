name: Build Local Refactor Package

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/build-local-refactor-package.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build safe local package
        shell: python
        run: |
          from pathlib import Path
          import re, shutil, zipfile

          root = Path('.')
          src = root / 'characters.html'
          if not src.exists():
              raise SystemExit('characters.html not found')

          text = src.read_text(encoding='utf-8')
          original = text
          parts = root / 'characters-parts'
          parts.mkdir(exist_ok=True)

          style_count = 0
          script_count = 0
          skipped_script_count = 0

          style_re = re.compile(r'<style(?P<attrs>[^>]*)>(?P<body>.*?)</style>', re.I | re.S)
          script_re = re.compile(r'<script(?P<attrs>[^>]*)>(?P<body>.*?)</script>', re.I | re.S)

          def attr_value(attrs, name):
              m = re.search(r'\b' + re.escape(name) + r'\s*=\s*(["\'])(.*?)\1', attrs, re.I | re.S)
              return m.group(2) if m else ''

          def replace_style(match):
              global style_count
              style_count += 1
              attrs = match.group('attrs') or ''
              body = match.group('body')
              name = f'characters-style-{style_count:03d}.css'
              (parts / name).write_text(body.strip() + '\n', encoding='utf-8')
              media = attr_value(attrs, 'media')
              media_attr = f' media="{media}"' if media else ''
              return f'<link rel="stylesheet" href="characters-parts/{name}"{media_attr}>'

          text = style_re.sub(replace_style, text)

          def replace_script(match):
              global script_count, skipped_script_count
              attrs = match.group('attrs') or ''
              body = match.group('body')
              if re.search(r'\bsrc\s*=', attrs, re.I):
                  return match.group(0)
              script_type = attr_value(attrs, 'type').strip().lower()
              if script_type not in ('', 'text/javascript', 'application/javascript', 'module'):
                  skipped_script_count += 1
                  return match.group(0)
              script_count += 1
              ext = 'mjs' if script_type == 'module' else 'js'
              name = f'characters-script-{script_count:03d}.{ext}'
              (parts / name).write_text(body.strip() + '\n', encoding='utf-8')
              kept_attrs = attrs.strip()
              spacer = (' ' + kept_attrs) if kept_attrs else ''
              return f'<script{spacer} src="characters-parts/{name}"></script>'

          text = script_re.sub(replace_script, text)
          src.write_text(text, encoding='utf-8')
          (root / 'characters.original.html').write_text(original, encoding='utf-8')

          notes = f'''# Mount Aetheria local refactor package

This package is for VS Code Live Server testing only.

## What changed
- `characters.html` now references external CSS and JavaScript files.
- Original inline code order was preserved.
- No function names, Firebase configuration, or application logic were intentionally changed.
- The untouched source is included as `characters.original.html`.

## Extracted files
- CSS blocks: {style_count}
- JavaScript blocks: {script_count}
- Non-JavaScript inline script blocks left in HTML: {skipped_script_count}

## Test
1. Open this folder in VS Code.
2. Run Live Server from `index.html` or `characters.html`.
3. Use a test account or test character because local pages still connect to the configured Firebase project.
4. Test sign-in, character loading, saving, refresh, skills, spells, abilities, weapons, inventory, shops, calendar, and mobile layout.

## Important
Do not upload this package to production until testing is complete.
'''
          (root / 'REFACTOR-NOTES.md').write_text(notes, encoding='utf-8')

          package = root / '_local_package'
          if package.exists(): shutil.rmtree(package)
          package.mkdir()

          always_include = {'.html','.htm','.js','.mjs','.css','.json','.md','.txt','.yml','.yaml','.svg','.xml','.webmanifest'}
          media_ext = {'.png','.jpg','.jpeg','.gif','.webp','.bmp','.tif','.tiff','.mp3','.wav','.ogg','.m4a','.mp4','.mov','.mkv','.avi','.webm','.pdf','.zip','.7z','.rar','.psd','.blend'}
          omitted = []
          max_media = 1 * 1024 * 1024

          for path in root.rglob('*'):
              if not path.is_file(): continue
              rel = path.relative_to(root)
              if rel.parts[0] in {'.git','_local_package'}: continue
              if rel.as_posix() == '.github/workflows/build-local-refactor-package.yml': continue
              size = path.stat().st_size
              ext = path.suffix.lower()
              if ext in media_ext and size > max_media:
                  omitted.append((rel.as_posix(), size))
                  continue
              if size > 8 * 1024 * 1024 and ext not in always_include:
                  omitted.append((rel.as_posix(), size))
                  continue
              dest = package / rel
              dest.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(path, dest)

          manifest = ['Omitted large/binary files. Copy these manually from the repository if needed:', '']
          manifest += [f'{size/1024/1024:.2f} MB\t{path}' for path,size in sorted(omitted)]
          (package / 'OMITTED-LARGE-FILES.txt').write_text('\n'.join(manifest) + '\n', encoding='utf-8')

          zip_path = root / 'Mount-Aetheria-local-refactor.zip'
          with zipfile.ZipFile(zip_path, 'w', zipfile.ZIP_DEFLATED) as z:
              for path in package.rglob('*'):
                  if path.is_file():
                      z.write(path, path.relative_to(package))

          print(f'Created {zip_path} with {style_count} CSS and {script_count} JS blocks; omitted {len(omitted)} large files.')

      - name: Upload local test ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Mount-Aetheria-local-refactor
          path: Mount-Aetheria-local-refactor.zip
          if-no-files-found: error
