<body>
<div id="customModal" class="custom-modal"><div class="custom-modal-content"><h3 id="modalTitle">Confirm</h3><p id="modalMsg">Are you sure?</p><div class="modal-actions"><button class="modal-btn confirm" id="modalYesBtn">Yes</button><button class="modal-btn cancel" id="modalNoBtn">No</button></div></div></div>
<nav class="top-nav"><button id="hamburgerBtn" onclick="document.getElementById('mobileMenu').classList.toggle('show')">&#9776;</button><a href="index.html" class="nav-brand">Mount Aetheria</a><div class="nav-links"><a href="story.html">Story</a><a href="tools.html" class="active" style="color:var(--accent)">Tools</a><a href="characters.html">Sheet</a><a href="discussions.html">Discussion</a><a href="signin.html" id="authLink">Sign In</a></div></nav>
<div id="mobileMenu"><a href="story.html">Story</a><a href="tools.html" style="color:var(--accent)">Tools</a><a href="characters.html">Character Sheet</a><a href="discussions.html">Discussion</a><a href="signin.html" id="mobileAuthLink">Sign In</a></div>
<h1>Tools</h1>
<div class="tab-buttons" id="toolsTabs"><button class="tab-btn active" data-tab="links">Information Links</button><button class="tab-btn" data-tab="shop">Shop Builder</button></div>
<div class="tab-content active" id="links"><section class="info-links-wrap" aria-label="Information Links"><div id="informationLinksGrid" class="info-links-grid"><div class="info-link-empty">Loading information links...</div></div></section></div>
<div class="tab-content" id="shop"><div class="shop-shell"><h2>Shop</h2>
  <div id="playerShopTop" class="shop-top-clean">
    <div class="shop-control embed-character-summary"><label>Current Character</label><strong id="embeddedCharacterName">Character</strong><select id="shopCharacterSelect" class="shop-select hidden" aria-hidden="true"></select><div id="characterGil" class="gil-line">Gil: 0</div></div>
    <div class="shop-control"><label>Region</label><select id="shopSelect" class="shop-select" onchange="renderSelectedShop()"></select></div>
  </div>

  <div id="adminShopPanel" class="admin-shop-panel gm-shop-admin-clean">
    <div id="adminIdentityStatus" class="hidden"></div>

    <div id="adminBuyerBox" class="gm-character-bar">
      <label>
        <span>Character</span>
        <select id="adminBuyerCharacterSelect" class="shop-select"></select>
      </label>
      <div id="adminBuyerGil" class="gm-character-gil">Gil: 0</div>
    </div>

    <div class="gm-shop-tabs" role="tablist" aria-label="Shop manager">
      <button id="gmIndividualTabBtn" class="gm-shop-tab active" type="button" onclick="setGmShopTab('individual')">Individual Shop</button>
      <button id="gmGroupTabBtn" class="gm-shop-tab" type="button" onclick="setGmShopTab('region')">Region</button>
    </div>

    <section id="gmIndividualShopPanel" class="gm-tab-panel active">
      <div class="gm-shop-toolbar">
        <select id="adminShopSelect" class="shop-select" aria-label="Individual shop" onchange="clearRegionPreview();renderSelectedShop()"></select>
        <div class="gm-action-row">
          <button class="shop-btn secondary" type="button" onclick="previewSelectedShopGm()">Preview</button>
          <button class="shop-btn secondary" type="button" onclick="startEditSelectedShop()">Edit</button>
          <button class="shop-btn" type="button" onclick="startCreateShop()">New</button>
          <button class="shop-btn danger" type="button" onclick="deleteSelectedShop()">Delete</button>
        </div>
      </div>

      <div id="adminBuilderBody" class="admin-builder collapsed gm-builder-shell">
        <div id="editShopNotice" class="edit-notice hidden"></div>

        <div class="gm-shop-settings">
          <label>
            <span>Shop Name</span>
            <input id="shopNameInput" class="shop-input" placeholder="Shop name">
          </label>
          <div id="shopTagPreview" class="shop-note"></div>
        </div>

        <div class="shop-layout clean-builder-layout gm-builder-layout">
          <aside class="shop-side">
            <h3>Categories</h3>
            <div id="categoryNav"></div>
            <div class="filter-box">
              <div id="activeFilterPills" class="tag-row"></div>
              <button class="shop-btn secondary small" type="button" onclick="clearAllFilters()">Clear Filters</button>
            </div>
          </aside>

          <main class="shop-main">
            <div class="gm-catalog-toolbar">
              <input id="itemSearchInput" class="shop-input" placeholder="Search items" oninput="renderBuilderItems()">
              <select id="builderSortInput" class="shop-select" aria-label="Sort items" onchange="setBuilderSort(this.value)">
                <option value="nameAsc">Name A-Z</option>
                <option value="gilAsc">Gil Low-High</option>
                <option value="gilDesc">Gil High-Low</option>
              </select>
            </div>

            <div class="gm-view-row">
              <div>
                <button id="builderViewAllBtn" class="shop-btn small" type="button" onclick="setBuilderViewMode('all')">All Items</button>
                <button id="builderViewSelectedBtn" class="shop-btn secondary small" type="button" onclick="setBuilderViewMode('selected')">Selected Only</button>
              </div>
              <div>
                <button class="shop-btn secondary small" type="button" onclick="selectVisibleItems()">Select Visible</button>
                <button class="shop-btn secondary small" type="button" onclick="unselectVisibleItems()">Unselect Visible</button>
              </div>
            </div>

            <h3 id="builderTitle" class="hidden">Gear</h3>
            <div id="filterGroups" class="filter-groups"></div>
            <div id="builderCount" class="shop-note"></div>
            <div id="builderItemList" class="compact-list"></div>
          </main>
        </div>

        <div class="gm-sticky-save">
          <strong id="gmSelectedItemCount">0 items selected</strong>
          <div class="gm-action-row">
            <button type="button" class="shop-btn secondary" onclick="cancelEditShop()">Cancel</button>
            <button id="saveShopBtn" type="button" class="shop-btn" onclick="saveShopSession()">Save Shop</button>
          </div>
        </div>
      </div>
    </section>

    <section id="gmGroupShopPanel" class="gm-tab-panel">
      <div class="gm-shop-toolbar">
        <select id="adminRegionSelect" class="shop-select" aria-label="Region"></select>
        <div class="gm-action-row">
          <button class="shop-btn secondary" type="button" onclick="previewSelectedRegion()">Preview</button>
          <button class="shop-btn secondary" type="button" onclick="editSelectedRegion()">Edit</button>
          <button class="shop-btn" type="button" onclick="startCreateRegion()">New</button>
          <button class="shop-btn danger" type="button" onclick="deleteSelectedRegion()">Delete</button>
        </div>
      </div>

      <section id="regionEditorPanel" class="shop-access-bundles gm-group-editor collapsed">
        <div class="gm-group-fields">
          <label>
            <span>Region Name</span>
            <input id="regionNameInput" class="shop-input" placeholder="Region name">
          </label>
          <label>
            <span>Party</span>
            <select id="regionPartySelect" class="shop-select" onchange="changeRegionParty(this.value)">
              <option value="">Select a party</option>
            </select>
          </label>
        </div>

        <div id="regionShopPicks" class="shop-bundle-shop-picks">
          <span class="shop-note">Select a party.</span>
        </div>

        <div class="gm-action-row gm-group-save-row">
          <button id="regionSaveBtn" class="shop-btn" type="button" onclick="saveRegion()">Save Region</button>
          <button class="shop-btn secondary" type="button" onclick="cancelRegionEdit()">Cancel</button>
        </div>
      </section>
    </section>
  </div>

  <div id="shopStatus" class="shop-status">Loading shops...</div>
  <div id="shopView"></div>
</div></div>

<div id="itemModal" class="item-modal" onclick="closeItemModal(event)"><div class="item-modal-card"><div class="item-modal-head"><h3 id="itemModalTitle">Item</h3><button class="modal-close" onclick="closeItemModal(event,true)">&times;</button></div><div id="itemModalBody" class="item-modal-body"></div></div></div>
<script type="module" src="tools-parts/scripts/tools-js-002-firebase-tools-module.mjs"></script>
</body>
</html>
